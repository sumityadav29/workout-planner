<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
      colors: {
        border: 'hsl(240 5.9% 90%)',
        input: 'hsl(240 5.9% 90%)',
        ring: 'hsl(240 5.9% 10%)',
        background: 'hsl(0 0% 100%)',
        foreground: 'hsl(240 10% 3.9%)',
        primary: { DEFAULT: 'hsl(240 5.9% 10%)', foreground: 'hsl(0 0% 98%)' },
        secondary: { DEFAULT: 'hsl(240 4.8% 95.9%)', foreground: 'hsl(240 5.9% 10%)' },
        muted: { DEFAULT: 'hsl(240 4.8% 95.9%)', foreground: 'hsl(240 3.8% 46.1%)' },
        accent: { DEFAULT: 'hsl(240 4.8% 95.9%)', foreground: 'hsl(240 5.9% 10%)' },
        card: { DEFAULT: 'hsl(0 0% 100%)', foreground: 'hsl(240 10% 3.9%)' },
      },
      borderRadius: { lg: '0.5rem', md: 'calc(0.5rem - 2px)', sm: 'calc(0.5rem - 4px)' },
    }
  }
}
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  .tab-trigger[data-state=active] { background:#fff; color:hsl(240 5.9% 10%); box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); }
  .cb[data-state=checked] { background:hsl(240 5.9% 10%); border-color:hsl(240 5.9% 10%); }
  .cb[data-state=checked] svg { opacity:1; }
  .row[data-done=true] .ex-title { text-decoration:line-through; color:hsl(240 3.8% 46.1%); }
  .row[data-done=true] { opacity:.65; }
</style>
</head>
<body class="bg-background font-sans text-foreground antialiased">
<div class="mx-auto max-w-2xl px-4 py-8 md:py-12">

  <!-- Header -->
  <div class="mb-8">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">Workout Plan</h1>
        <p class="mt-1 text-sm text-muted-foreground">Body recomposition · 4 lifts + 2 runs weekly</p>
      </div>
      <a href="../" class="inline-flex h-9 items-center rounded-md border border-input bg-background px-3 text-sm font-medium shadow-sm transition-colors hover:bg-accent hover:text-accent-foreground">Classic view</a>
    </div>
  </div>

  <!-- Tabs -->
  <div class="inline-flex h-9 w-full items-center justify-between rounded-lg bg-muted p-1 text-muted-foreground" role="tablist" id="tabs">
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="0">Mon</button>
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="1">Tue</button>
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="2">Wed</button>
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="3">Thu</button>
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="4">Fri</button>
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="5">Sat</button>
    <button class="tab-trigger flex-1 rounded-md px-2 py-1 text-xs font-medium transition-all sm:text-sm" data-day="6">Sun</button>
  </div>

  <div id="panel" class="mt-6"></div>

</div>

<script>
const PLAN = [
  {
    day: 'Monday', type: 'Push', badge: 'bg-orange-100 text-orange-700', time: '~60 min',
    sections: [{ label: null, ex: [
      { n: 'Barbell Bench Press', m: 'Chest · Shoulders · Triceps', s: '4 × 4–6', r: '3 min' },
      { n: 'Overhead Press', m: 'Shoulders · Triceps', s: '3 × 6–8', r: '2 min' },
      { n: 'Incline DB Press', m: 'Upper chest · Front delts', s: '3 × 10–12', r: '90s' },
      { n: 'Lateral Raises', m: 'Medial delts', s: '3 × 15–20', r: '60s' },
      { n: 'Tricep Pushdown', m: 'Triceps', s: '3 × 12–15', r: '60s' },
      { n: 'Tricep Bench Dips', m: 'Triceps · Finisher', s: '3 × 15–20', r: '60s' },
    ]}]
  },
  {
    day: 'Tuesday', type: 'Cardio', badge: 'bg-teal-100 text-teal-700', time: '30–40 min',
    run: { title: 'Zone 2 Run', desc: '30–40 minutes at conversational pace (~65% max HR). You should be able to hold a full sentence — if you can\'t, slow down. Optimal for fat oxidation while preserving muscle.' }
  },
  {
    day: 'Wednesday', type: 'Pull + Core', badge: 'bg-blue-100 text-blue-700', time: '~65 min',
    sections: [
      { label: null, ex: [
        { n: 'Barbell Row', m: 'Back thickness · Biceps', s: '4 × 4–6', r: '3 min' },
        { n: 'Weighted Pull-ups', m: 'Lats · Biceps', s: '3 × 6–8', r: '2 min' },
        { n: 'Cable Seated Row', m: 'Mid back · Rear delts', s: '3 × 10–12', r: '90s' },
        { n: 'Face Pulls', m: 'Rear delts · Posture', s: '3 × 15–20', r: '60s' },
        { n: 'Barbell Curl', m: 'Biceps', s: '3 × 10–12', r: '60s' },
      ]},
      { label: 'Core', ex: [
        { n: 'Dead Bug', m: 'Transverse abdominis · APT fix', s: '3 × 8 /side', r: '45s' },
        { n: 'Plank', m: 'Anterior core · Stability', s: '3 × 40 sec', r: '45s' },
        { n: 'Hanging Leg Raise', m: 'Lower abs', s: '3 × 12–15', r: '60s' },
      ]}
    ]
  },
  {
    day: 'Thursday', type: 'Legs', badge: 'bg-green-100 text-green-700', time: '~55 min',
    sections: [{ label: null, ex: [
      { n: 'Back Squat', m: 'Quads · Glutes · Strength', s: '4 × 4–6', r: '3–4 min' },
      { n: 'Romanian Deadlift', m: 'Hamstrings · Glutes', s: '3 × 8–10', r: '2 min' },
      { n: 'Bulgarian Split Squat', m: 'Quads · Glutes · Unilateral', s: '3 × 10–12', r: '90s' },
      { n: 'Hip Thrust', m: 'Glutes · Posture', s: '3 × 12–15', r: '90s' },
      { n: 'Seated Leg Curl', m: 'Hamstrings', s: '3 × 12–15', r: '60s' },
      { n: 'Standing Calf Raise', m: 'Calves', s: '4 × 15–20', r: '60s' },
    ]}]
  },
  {
    day: 'Friday', type: 'Upper + Core', badge: 'bg-purple-100 text-purple-700', time: '~55 min',
    sections: [
      { label: null, ex: [
        { n: 'Cable Fly', m: 'Chest', s: '3 × 12–15', r: null, ss: 'A1' },
        { n: 'Lat Pulldown', m: 'Lats · Biceps', s: '3 × 10–12', r: '90s', ss: 'A2' },
        { n: 'DB Shoulder Press', m: 'Shoulders', s: '3 × 10–12', r: null, ss: 'B1' },
        { n: 'Cable Row', m: 'Mid back · Biceps', s: '3 × 12–15', r: '90s', ss: 'B2' },
        { n: 'DB Curl', m: 'Biceps', s: '3 × 12–15', r: null, ss: 'C1' },
        { n: 'Tricep Overhead Ext', m: 'Triceps', s: '3 × 12–15', r: '60s', ss: 'C2' },
        { n: 'Lateral Raises', m: 'Medial delts', s: '3 × 15–20', r: '60s' },
      ]},
      { label: 'Core', ex: [
        { n: 'Cable Crunch', m: 'Abs · Hypertrophy', s: '3 × 15–20', r: '45s' },
        { n: 'Ab Wheel Rollout', m: 'Anti-extension · Total core', s: '3 × 8–10', r: '60s' },
        { n: 'Hollow Hold', m: 'Lower abs · APT fix', s: '3 × 25–30s', r: '45s' },
      ]}
    ]
  },
  {
    day: 'Saturday', type: 'Cardio', badge: 'bg-teal-100 text-teal-700', time: '20–30 min',
    run: { title: 'Intervals or Easy Jog', desc: '6–8 rounds of 1 min hard / 2 min easy if legs feel fresh. Keep it an easy Zone 2 jog if Thursday soreness lingers.' }
  },
  {
    day: 'Sunday', type: 'Rest', badge: 'bg-zinc-100 text-zinc-600', time: null,
    run: { title: 'Recovery Day', desc: 'This is where the gains happen. Sleep 7–9 hours, stay hydrated. Light walking is fine.' }
  },
];

const done = PLAN.map(d => d.sections ? d.sections.flatMap(s => s.ex).map(() => false) : []);
const TODAY = [6,0,1,2,3,4,5][new Date().getDay()];
let cur = TODAY;

const CHECK = `<svg class="opacity-0 transition-opacity" width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.5 9L10 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function render() {
  const d = PLAN[cur];
  const isToday = cur === TODAY;
  let inner = '';

  if (d.sections) {
    const flat = d.sections.flatMap(s => s.ex);
    const total = flat.length;
    const checked = done[cur].filter(Boolean).length;
    const pct = Math.round((checked / total) * 100);

    let idx = 0;
    const sectionsHtml = d.sections.map(sec => {
      const rows = sec.ex.map(ex => {
        const i = idx++;
        const isDone = done[cur][i];
        return `
        <div class="row flex items-center gap-3 py-3" data-done="${isDone}">
          <button class="cb flex h-4 w-4 shrink-0 items-center justify-center rounded-sm border border-primary shadow transition-colors" data-state="${isDone ? 'checked' : 'unchecked'}" onclick="toggle(${i})" aria-label="Mark ${ex.n} done">${CHECK}</button>
          <div class="min-w-0 flex-1">
            <p class="ex-title truncate text-sm font-medium leading-none">${ex.n}${ex.ss ? ` <span class="ml-1.5 inline-flex items-center rounded-md bg-secondary px-1.5 py-0.5 text-[10px] font-semibold text-secondary-foreground">${ex.ss}</span>` : ''}</p>
            <p class="mt-1 truncate text-xs text-muted-foreground">${ex.m}</p>
          </div>
          <div class="shrink-0 text-right">
            <p class="text-sm font-semibold tabular-nums">${ex.s}</p>
            <p class="mt-0.5 text-xs text-muted-foreground">${ex.r ? 'rest ' + ex.r : 'no rest →'}</p>
          </div>
        </div>`;
      }).join('<div class="h-px bg-border"></div>');

      const divider = sec.label ? `
        <div class="flex items-center gap-3 pt-4 pb-1">
          <div class="h-px flex-1 bg-border"></div>
          <span class="text-[10px] font-semibold uppercase tracking-widest text-muted-foreground">${sec.label}</span>
          <div class="h-px flex-1 bg-border"></div>
        </div>` : '';
      return divider + rows;
    }).join('');

    inner = `
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <h2 class="text-lg font-semibold leading-none tracking-tight">${d.day}</h2>
          ${isToday ? '<span class="inline-flex items-center rounded-md bg-primary px-2 py-0.5 text-[10px] font-semibold text-primary-foreground">Today</span>' : ''}
        </div>
        <span class="inline-flex items-center rounded-md ${d.badge} px-2.5 py-0.5 text-xs font-semibold">${d.type}</span>
      </div>
      <p class="mt-1.5 text-sm text-muted-foreground">${checked} of ${total} exercises · ${d.time}</p>
      <div class="mt-4 h-2 w-full overflow-hidden rounded-full bg-secondary">
        <div class="h-full bg-primary transition-all duration-300" style="width:${pct}%"></div>
      </div>
      <div class="mt-4">${sectionsHtml}</div>
      ${checked === total ? `
        <div class="mt-4 flex items-center justify-between rounded-lg border bg-secondary/50 px-4 py-3">
          <p class="text-sm font-medium">Workout complete 🎉</p>
          <button class="inline-flex h-8 items-center rounded-md border border-input bg-background px-3 text-xs font-medium shadow-sm transition-colors hover:bg-accent" onclick="resetDay()">Reset</button>
        </div>` : ''}`;
  } else {
    inner = `
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <h2 class="text-lg font-semibold leading-none tracking-tight">${d.day}</h2>
          ${isToday ? '<span class="inline-flex items-center rounded-md bg-primary px-2 py-0.5 text-[10px] font-semibold text-primary-foreground">Today</span>' : ''}
        </div>
        <span class="inline-flex items-center rounded-md ${d.badge} px-2.5 py-0.5 text-xs font-semibold">${d.type}</span>
      </div>
      <div class="mt-6 rounded-lg border bg-secondary/30 p-5">
        <h3 class="text-sm font-semibold">${d.run.title}</h3>
        <p class="mt-2 text-sm leading-relaxed text-muted-foreground">${d.run.desc}</p>
        ${d.time ? `<p class="mt-3 text-xs font-medium text-muted-foreground">Duration: ${d.time}</p>` : ''}
      </div>`;
  }

  document.getElementById('panel').innerHTML = `
    <div class="rounded-xl border bg-card p-6 text-card-foreground shadow">${inner}</div>`;

  document.querySelectorAll('.tab-trigger').forEach((t, i) =>
    t.setAttribute('data-state', i === cur ? 'active' : 'inactive'));
}

function toggle(i) {
  done[cur][i] = !done[cur][i];
  if (done[cur][i] && navigator.vibrate) navigator.vibrate(22);
  render();
}
function resetDay() { done[cur] = done[cur].map(() => false); render(); }

document.querySelectorAll('.tab-trigger').forEach(t =>
  t.addEventListener('click', () => { cur = +t.dataset.day; render(); }));

render();
</script>
</body>
</html>
